<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>КЛЕР БАНК</title>
<style>
    body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; }
    .box { width: 320px; margin: 20px auto; padding: 20px; background: #151515; border-radius: 20px; }
    input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }
    button { background: #8a2be2; color: white; cursor: pointer; }
</style>
</head>
<body>
<div id="auth" class="box">
    <h2>Вход в КЛЕР БАНК</h2>
    <input id="u" placeholder="Ник"><input id="p" type="password" placeholder="Пароль">
    <button onclick="auth('login')">Войти</button>
</div>
<div id="main" class="box" style="display:none">
    <h3>Баланс: <span id="bal">0</span> РБ</h3>
    <a href="gallery.html" style="color:cyan">🖼 Посмотреть работы</a><br><br>
    <input id="item" placeholder="Название маски"><button onclick="order()">Заказать (100 РБ)</button>
    <div id="chat-hist" style="height:100px; overflow-y:auto; background:#222; margin:10px 0;"></div>
    <input id="chat-in" placeholder="Сообщение"><button onclick="sendChat()">Отправить</button>
</div>
<script>
    let user = null;
    async function auth(type) {
        const d = { username:document.getElementById('u').value, password:document.getElementById('p').value };
        const res = await fetch('/api/'+type, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
        if((await res.json()).success) { user = d.username; document.getElementById('auth').style.display='none'; document.getElementById('main').style.display='block'; }
    }
    async function sendChat() {
        await fetch('/api/chat/send', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, sender:user, text:document.getElementById('chat-in').value})});
        document.getElementById('chat-in').value='';
    }
    async function order() {
        await fetch('/api/order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, item:document.getElementById('item').value})});
        alert("Заказ принят!");
    }
</script>
</body>
</html>
