<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КЛЕР БАНК</title>
    <style>
        body { 
            background: #0a0a0a; color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 15px; font-size: 16px; 
        }
        .box { 
            width: 100%; max-width: 400px; margin: 10px auto; padding: 20px; 
            background: #151515; border-radius: 20px; border: 1px solid #333; box-sizing: border-box; 
        }
        .panel {
            background: #222; padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        input { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; 
            border: none; box-sizing: border-box; font-size: 16px; background: #2a2a2a; color: white;
        }
        button { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; 
            border: none; cursor: pointer; font-weight: bold; font-size: 16px; 
        }
        .btn-main { background: #8a2be2; color: white; }
        .btn-sec { background: #333; color: white; }
        .btn-transfer { background: #00ffcc; color: black; }
        .order-card { 
            background: #2a2a2a; padding: 15px; margin: 12px 0; border-radius: 12px; 
            text-align: left; font-size: 15px; border-left: 4px solid #8a2be2; word-wrap: break-word; 
        }
    </style>
</head>
<body>

<div id="auth" class="box">
    <h2>Вход в КЛЕР БАНК</h2>
    <input id="u" placeholder="Никнейм">
    <input id="p" type="password" placeholder="Пароль">
    <button class="btn-main" onclick="auth('login')">Войти</button>
    <button class="btn-sec" onclick="auth('register')">Регистрация</button>
</div>

<div id="main" class="box" style="display:none">
    <h3>Баланс: <span id="bal" style="color: #8a2be2; font-size: 24px;">0</span> РБ</h3>
    
    <div class="panel">
        <h4 style="margin-top: 0; color: #00ffcc;">💸 Перевод средств</h4>
        <input id="t-user" placeholder="Ник получателя">
        <input id="t-amount" type="number" placeholder="Сумма (РБ)">
        <button class="btn-transfer" onclick="transfer()">Перевести</button>
    </div>

    <div class="panel">
        <h4 style="margin-top: 0;">🛒 Магазин масок</h4>
        <input id="item" placeholder="Какую маску заказываете?">
        <button class="btn-main" onclick="order()">Заказать (100 РБ)</button>
    </div>
    
    <h4 style="text-align: left;">Ваши заказы:</h4>
    <div id="my-orders"></div>

    <div id="admin-panel" style="display:none; border-top: 2px solid #333; margin-top: 25px; padding-top: 15px;">
        <h3 style="color: #00ffcc;">👑 Админ-панель</h3>
        <div id="all-orders"></div>
    </div>
</div>

<script>
    let currentUser = null;

    async function auth(type) {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const res = await fetch('/api/'+type, { 
            method:'POST', headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.success) { 
            currentUser = u;
            document.getElementById('auth').style.display='none'; 
            document.getElementById('main').style.display='block'; 
            updateData();
        } else {
            alert(data.message || "Ошибка!");
        }
    }

    async function updateData() {
        const res = await fetch('/api/data/' + currentUser);
        const data = await res.json();
        
        document.getElementById('bal').innerText = data.balance;
        
        document.getElementById('my-orders').innerHTML = data.myOrders.map(o => 
            `<div class="order-card"><b>${o.item}</b><br><span style="color:#aaa">Статус:</span> ${o.status}</div>`
        ).join('') || "<p style='color:gray; font-size:14px;'>Заказов пока нет</p>";

        if(data.role === 'admin') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('all-orders').innerHTML = data.allOrders.map(o => 
                `<div class="order-card">
                    <b>Клиент:</b> ${o.username} <br>
                    <b>Маска:</b> ${o.item} <br>
                    <b>Статус:</b> <span style="color:#00ffcc">${o.status}</span> <br>
                    <button onclick="setStatus(${o.id}, '✅ Выполнено')" style="background: #28a745; color: white; padding: 12px; margin-top: 10px; font-size: 14px; width: 100%; border: none; border-radius: 8px; cursor: pointer;">Отметить Выполнено</button>
                </div>`
            ).join('') || "<p style='color:gray; font-size:14px;'>Новых заказов нет</p>";
        }
    }

    // Функция перевода
    async function transfer() {
        const recipient = document.getElementById('t-user').value;
        const amount = document.getElementById('t-amount').value;
        
        if(!recipient || !amount) return alert("Заполните все поля для перевода!");

        const res = await fetch('/api/transfer', { 
            method:'POST', headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({sender: currentUser, recipient: recipient, amount: amount})
        });
        const data = await res.json();
        if(data.success) {
            alert(`Успешно переведено ${amount} РБ игроку ${recipient}!`);
            document.getElementById('t-user').value = '';
            document.getElementById('t-amount').value = '';
            updateData();
        } else {
            alert(data.message);
        }
    }

    async function order() {
        const item = document.getElementById('item').value;
        if(!item) return alert("Введите название маски!");
        
        const res = await fetch('/api/order', { 
            method:'POST', headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({username: currentUser, item: item})
        });
        const data = await res.json();
        if(data.success) {
            document.getElementById('item').value = '';
            updateData();
        } else {
            alert(data.message);
        }
    }

    async function setStatus(id, status) {
        await fetch('/api/update-status', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({id, status})
        });
        updateData();
    }
</script>
</body>
</html>
