<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КлерБанк & КЛ</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 480px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: linear-gradient(90deg, #481173, #cb11ab); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .status-badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; background: #ff9900; }
        .admin-panel { background: #2a1435; border: 1px solid #cb11ab; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="auth-screen" class="screen">
        <div class="card">
            <h3>Вход в КЛ</h3>
            <input type="text" id="auth-username" placeholder="Ник...">
            <input type="password" id="auth-password" placeholder="Пароль...">
            <button onclick="handleLogin()">Войти</button>
            <button onclick="handleRegister()" style="background: #333;">Создать аккаунт</button>
        </div>
    </div>

    <div id="main-screen" class="screen" style="display:none;">
        <div class="card">
            <div id="user-info"></div>
            <div style="font-size: 32px; font-weight: bold; color: #00ff66;"><span id="user-balance">0</span> РБ</div>
        </div>
        <div class="card">
            <h3>Заказать товар</h3>
            <input type="text" id="order-item-name" placeholder="Например: Кола...">
            <button onclick="createOrder()">Оформить заказ</button>
        </div>
        <div class="card">
            <h3>Мои заказы</h3>
            <div id="my-orders-list"></div>
        </div>
        <div id="admin-section" class="card admin-panel" style="display:none;">
            <h3>👑 Админка Серёги</h3>
            <input type="text" id="admin-target-user" placeholder="Ник игрока">
            <input type="number" id="admin-money-amount" placeholder="Сумма (или -сумма)">
            <button onclick="adminChangeBalance()" style="background:#00ff66; color:black;">💰 Изменить баланс</button>
            <h4>Заказы:</h4>
            <div id="all-orders-list"></div>
        </div>
    </div>
</div>
<script>
    let currentUser = null;
    async function handleLogin() {
        const username = document.getElementById('auth-username').value;
        const password = document.getElementById('auth-password').value;
        const res = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
        const data = await res.json();
        if(data.success) { currentUser = data.user; showMain(); } else alert(data.message);
    }
    async function handleRegister() {
        const username = document.getElementById('auth-username').value;
        const password = document.getElementById('auth-password').value;
        const res = await fetch('/api/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
        alert((await res.json()).message);
    }
    function showMain() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        document.getElementById('user-name').innerText = currentUser.username;
        if(currentUser.username === 'bot_banker') document.getElementById('admin-section').style.display = 'block';
        loadAll();
    }
    async function adminChangeBalance() {
        const targetUser = document.getElementById('admin-target-user').value;
        const amount = document.getElementById('admin-money-amount').value;
        await fetch('/api/admin/change-balance', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({targetUser, amount}) });
        alert('Баланс изменён!');
    }
    async function createOrder() {
        const item = document.getElementById('order-item-name').value;
        await fetch('/api/orders/create', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser.username, item}) });
        loadAll();
    }
    async function updateOrderStatus(id, status) {
        await fetch('/api/orders/update-status', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({orderId: id, newStatus: status}) });
        loadAll();
    }
    async function loadAll() {
        // Баланс
        const resBal = await fetch(`/api/user/balance/${currentUser.username}`);
        document.getElementById('user-balance').innerText = (await resBal.json()).balance;
        // Мои заказы
        const resMy = await fetch(`/api/orders/my/${currentUser.username}`);
        document.getElementById('my-orders-list').innerHTML = (await resMy.json()).map(o => `<div>${o.item}: <b>${o.status}</b></div>`).join('');
        // Админка
        if(currentUser.username === 'bot_banker') {
            const resAll = await fetch('/api/orders/all');
            const orders = (await resAll.json()).filter(o => o.status !== 'Выдано');
            document.getElementById('all-orders-list').innerHTML = orders.map(o => `
                <div style="margin:10px 0;">
                    <b>${o.username}</b>: ${o.item} (${o.status})<br>
                    <button onclick="updateOrderStatus(${o.id}, 'Выдано')" style="background:#ff00cc; padding:5px;">✅ Выдано</button>
                </div>
            `).join('');
        }
    }
</script>
</body>
</html>
