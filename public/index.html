<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КЛЕР БАНК</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; }
        .container { width: 350px; padding: 20px; background: #1a1a1a; border-radius: 20px; margin-top: 50px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; box-sizing: border-box; }
        button { background: #8a2be2; color: #fff; font-weight: bold; cursor: pointer; }
        .order { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
<div class="container" id="auth">
    <h2>Вход / Регистрация</h2>
    <input id="u" placeholder="Никнейм">
    <input id="p" type="password" placeholder="Пароль">
    <button onclick="auth('login')">Войти</button>
    <button onclick="auth('register')" style="background:#333">Регистрация</button>
</div>
<div class="container" id="main" style="display:none">
    <h3>Баланс: <span id="bal">0</span> РБ</h3>
    <input id="item" placeholder="Что заказать?">
    <button onclick="order()">Заказать</button>
    <div id="orders"></div>
    <div id="admin" style="display:none; border-top: 2px solid #8a2be2; margin-top: 20px;">
        <h3>👑 Админка</h3>
        <input id="a-u" placeholder="Ник игрока">
        <input id="a-s" placeholder="Сумма">
        <button onclick="adminBal()">Начислить</button>
        <div id="all-orders"></div>
    </div>
</div>
<script>
    let user = null;
    async function auth(type) {
        const username = document.getElementById('u').value;
        const password = document.getElementById('p').value;
        const res = await fetch('/api/'+type, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password})});
        const data = await res.json();
        if(data.success) { user = username; document.getElementById('auth').style.display='none'; document.getElementById('main').style.display='block'; update(); }
        else alert(data.message);
    }
    async function update() {
        const res = await fetch('/api/data/'+user);
        const d = await res.json();
        document.getElementById('bal').innerText = d.balance;
        document.getElementById('orders').innerHTML = d.myOrders.map(o => `<div class="order">${o.item} <b>${o.status}</b></div>`).join('');
        if(d.allOrders) {
            document.getElementById('admin').style.display='block';
            document.getElementById('all-orders').innerHTML = d.allOrders.map(o => `<div class="order">${o.username}: ${o.item} <button onclick="setStatus(${o.id}, 'Выдано')" style="width:auto">✅</button></div>`).join('');
        }
    }
    async function order() {
        await fetch('/api/order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, item:document.getElementById('item').value})});
        update();
    }
    async function adminBal() {
        await fetch('/api/admin/balance', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:document.getElementById('a-u').value, amount:document.getElementById('a-s').value})});
        update();
    }
    async function setStatus(id, status) {
        await fetch('/api/update-status', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, status})});
        update();
    }
</script>
</body>
</html>
