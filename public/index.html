<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>КЛЕР БАНК</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; }
        .box { width: 320px; margin: 50px auto; padding: 25px; background: #151515; border-radius: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-main { background: #8a2be2; color: white; }
        .btn-sec { background: #333; color: white; }
    </style>
</head>
<body>

<div id="auth" class="box">
    <h2>Вход в КЛЕР БАНК</h2>
    <input id="u" placeholder="Никнейм">
    <input id="p" type="password" placeholder="Пароль">
    <button class="btn-main" onclick="auth('login')">Войти</button>
    <button class="btn-sec" onclick="auth('register')">Регистрация</button>
</div>

<div id="main" class="box" style="display:none">
    <h3>КЛЕР БАНК</h3>
    <input id="item" placeholder="Название маски">
    <button class="btn-main" onclick="order()">Заказать</button>
</div>

<script>
    let currentUsername = "";
    async function auth(type) {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        const res = await fetch('/api/'+type, { 
            method:'POST', headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({username: u, password: p})
        });
        if((await res.json()).success) { 
            currentUsername = u;
            document.getElementById('auth').style.display='none'; 
            document.getElementById('main').style.display='block'; 
        } else alert("Ошибка!");
    }
    async function order() {
        const item = document.getElementById('item').value;
        await fetch('/api/order', { 
            method:'POST', headers:{'Content-Type':'application/json'}, 
            body:JSON.stringify({username: currentUsername, item: item})
        });
        alert("Заказ оформлен!");
    }
</script>
</body>
</html>
