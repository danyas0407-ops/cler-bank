<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КлерБанк & ПВЗ</title>
    <style>
        :root {
            --wb-purple: #481173;
            --wb-pink: #cb11ab;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-gray: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: #181818;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 2px solid var(--wb-purple);
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(45deg, var(--wb-pink), #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }

        .balance-title { color: var(--text-gray); font-size: 14px; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 10px 0; color: #00ff66; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px 0;
            background-color: #2b2b2b;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--wb-purple), var(--wb-pink));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; }
        .btn-secondary { background: #333; margin-top: 10px; }

        .order-item {
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ff9900;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }

        .status-принят { background-color: #ff9900; color: black; }
        .status-делается { background-color: #0077ff; color: white; }
        .status-пвз { background-color: #00ff66; color: black; }

        .admin-panel {
            background: #2a1435;
            border: 1px solid var(--wb-pink);
        }
        .admin-order {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .admin-btns { display: flex; gap: 5px; margin-top: 5px; }
        .admin-btns button { padding: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>КЛЕР БАНК & WB</h1>
    </div>

    <div id="auth-screen" class="screen active">
        <div class="card">
            <h3>Вход в систему</h3>
            <label>Ваш Никнейм:</label>
            <input type="text" id="auth-username" placeholder="Введите ник...">
            <label>Пароль:</label>
            <input type="password" id="auth-password" placeholder="Введите пароль...">
            
            <button onclick="handleLogin()">Войти</button>
            <button onclick="handleRegister()" class="btn-secondary">Создать аккаунт</button>
        </div>
    </div>

    <div id="main-screen" class="screen">
        <div class="card">
            <div class="balance-title">Личный кабинет: <span id="user-name" style="color:white; font-weight:bold;"></span></div>
            <div class="balance-amount"><span id="user-balance">0</span> РБ</div>
            <button onclick="logout()" class="btn-secondary" style="padding: 6px; font-size: 12px; width: auto; margin-top: 5px;">Выйти из аккаунта</button>
        </div>

        <div class="card">
            <h3>📦 Заказать товар в ПВЗ</h3>
            <label>Что хотите заказать?</label>
            <input type="text" id="order-item-name" placeholder="Например: Стак алмазов, Кола, Чипсы...">
            <button onclick="createOrder()">Оформить заказ</button>
        </div>

        <div class="card">
            <h3>📋 Мои заказы и статусы</h3>
            <div id="my-orders-list">Пока нет заказов...</div>
        </div>

        <div id="admin-section" class="card admin-panel" style="display: none;">
            <h3>👑 Управление заказами ПВЗ (Для Серёги)</h3>
            <div id="all-orders-list">Заказов в системе нет...</div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // Функция Входа
    async function handleLogin() {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value.trim();

        if(!username || !password) return alert('Заполните все поля!');

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (data.success) {
                currentUser = data.user;
                initDashboard();
            } else {
                alert(data.message);
            }
        } catch (err) {
            alert('Ошибка соединения с сервером!');
        }
    }

    // Функция Регистрации
    async function handleRegister() {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value.trim();

        if(!username || !password) return alert('Заполните все поля!');

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message);
        } catch (err) {
            alert('Ошибка при регистрации!');
        }
    }

    // Загрузка личного кабинета после входа
    function initDashboard() {
        document.getElementById('user-name').innerText = currentUser.username;
        document.getElementById('user-balance').innerText = currentUser.balance;
        switchScreen('main-screen');
        
        // Проверяем, зашел ли Серёга или админ
        if(currentUser.username === 'bot_banker' || currentUser.role === 'admin') {
            document.getElementById('admin-section').style.display = 'block';
            loadAdminOrders();
        } else {
            document.getElementById('admin-section').style.display = 'none';
        }

        loadMyOrders();
    }

    // Создать новый заказ
    async function createOrder() {
        const itemInput = document.getElementById('order-item-name');
        const item = itemInput.value.trim();
        if(!item) return alert('Напишите, что именно вы заказываете!');

        const res = await fetch('/api/orders/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser.username, item: item })
        });
        const data = await res.json();
        if(data.success) {
            itemInput.value = '';
            loadMyOrders();
            if(currentUser.username === 'bot_banker' || currentUser.role === 'admin') loadAdminOrders();
        }
    }

    // Показать заказы текущего вошедшего пользователя
    async function loadMyOrders() {
        const res = await fetch(`/api/orders/my/${currentUser.username}`);
        const orders = await res.json();
        const container = document.getElementById('my-orders-list');
        
        if(orders.length === 0) {
            container.innerHTML = 'У вас пока нет активных заказов.';
            return;
        }

        container.innerHTML = orders.map(o => {
            let badgeClass = 'status-принят';
            let borderLeftColor = '#ff9900';
            
            if(o.status === 'Делается') {
                badgeClass = 'status-делается';
                borderLeftColor = '#0077ff';
            }
            if(o.status === 'Лежит и ждёт вас в ПВЗ') {
                badgeClass = 'status-пвз';
                borderLeftColor = '#00ff66';
            }

            return `
                <div class="order-item" style="border-left-color: ${borderLeftColor}">
                    <strong>${o.item}</strong><br>
                    <span class="status-badge ${badgeClass}">${o.status}</span>
                </div>
            `;
        }).join('');
    }

    // Показать ВСЕ заказы для Серёги
    async function loadAdminOrders() {
        const res = await fetch('/api/orders/all');
        const orders = await res.json();
        const container = document.getElementById('all-orders-list');

        if(orders.length === 0) {
            container.innerHTML = 'Заказов от клиентов пока нет.';
            return;
        }

        container.innerHTML = orders.map(o => `
            <div class="admin-order">
                <div>👤 <b>${o.username}</b> заказал: <b>${o.item}</b></div>
                <div>Статус: <u>${o.status}</u></div>
                <div class="admin-btns">
                    <button onclick="updateOrderStatus(${o.id}, 'Делается')" style="background:#0077ff">🔨 Делается</button>
                    <button onclick="updateOrderStatus(${o.id}, 'Лежит и ждёт вас в ПВЗ')" style="background:#00ff66; color:black;">🏪 В ПВЗ</button>
                </div>
            </div>
        `).join('');
    }

    // Обновление статуса заказа кнопками админа
    async function updateOrderStatus(orderId, newStatus) {
        await fetch('/api/orders/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ orderId, newStatus })
        });
        loadAdminOrders();
        loadMyOrders();
    }

    // Выход
    function logout() {
        currentUser = null;
        switchScreen('auth-screen');
    }
</script>
</body>
</html>
