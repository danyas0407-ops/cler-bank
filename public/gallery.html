<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Галерея</title>
<style>
    body { background: #0a0a0a; color: white; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .item { background: #1a1a1a; padding: 10px; border-radius: 10px; text-align: center; }
    img { width: 100%; border-radius: 5px; }
</style>
</head>
<body>
    <script>
        const photos = ["5a8e038b-0e62-4ea5-8279-38ef22350d6d.jpg", "851963ee-6c91-48e3-9e92-5355d73723cc.jpg", "c655a604-89fd-4b77-b887-48591fba883e.jpg", "d6e2222b-6030-45ee-a135-17f622f14212.jpg", "db41502f-7ca3-4881-99f3-924c46319f78.jpg", "dcb17cee-52e6-471f-a9d7-dbafb0197d5c.jpg"];
        photos.forEach(p => {
            document.body.innerHTML += `<div class="item"><img src="images/${p}"><h3>Маска</h3></div>`;
        });
    </script>
</body>
</html>
